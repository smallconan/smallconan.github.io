<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>只影何归</title>
    <link rel="stylesheet" href="css/dily.css">
    <link href="css/search.css" rel="stylesheet">
    <link href="css/base.css" rel="stylesheet">
    <link rel="stylesheet" href="css/swiper.css">
    <script src="js/jquery_2.1.4.js" type="text/javascript"></script>
    <script src="js/search.js" type="text/javascript"></script>
    <script src="js/swiper.js"></script>

</head>
<body>
<div class="swiper-container">
    <div class="swiper-wrapper">
        <div class="swiper-slide">
            <div class="clearfix">
                <div class="place-45"></div>
                <div id="search_bar" class="search_bar side-box" title="搜索">
                    <span class="close" title="关闭搜索"></span>
                    <form action="https://www.baidu.com/baidu" target="_blank">
                        <input class="input"  type="text" name="wd" id="search" autocomplete="off"  >
                        <!-- <input class="search_btn" type="submit" name="wd">-->
                        <span class="search_ico"></span>
                    </form>
                </div >
                <div class="blog side-box" title="我的博客"></div>
                <div class="side-box translate" title="翻译"></div>
                <div class="web-box">
                    <div class="box-container">
                        <div class="box" title="bilibili">
                            <div class="box-slogan"><img src="img/bilibili.png"></div>
                            <div class="box-title"> bilibili</div>
                        </div>
                    </div>
                    <div class="box-container">
                        <div class="box" title="Minecraft">
                            <div class="box-slogan"><img src="img/minecraft.png"> </div>
                            <div class="box-title">我的世界中文论坛</div>
                        </div>
                    </div>
                    <div class="box-container">
                        <div class="box" title="google">
                            <div class="box-slogan"><img src="img/google.png" width="32" height="32"> </div>
                            <div class="box-title">谷歌翻译</div>
                        </div>
                    </div>
                    <div class="box-container">
                        <div class="box" title="YouTube">
                            <div class="box-slogan"><img src="img/youtube.png"> </div>
                            <div class="box-title">YouTube</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="swiper-slide" >
            <div class="card code">
                <div class="card-header">今日美文-<span style="font-style: italic">品人生酸甜苦辣咸</span></div>
                <div class="card-body">
                    <h3 id="title"  class="card-title" ></h3><br>
                    <h4 id="author" class="card-subtitle"></h4><br>
                    <p style="color: gainsboro;font-style: italic">内容提要:</p>
                    <p id="digest" class="card-text"></p>
                    <button id="read-more">阅读片段</button>
                </div>
                <div class="card-footer">版权归原作者所有</div>
                <script>
                    var time=localStorage.date;
                    var xmlhttp=new XMLHttpRequest();
                    var myObj;
                    xmlhttp.onreadystatechange=function(){
                        if (xmlhttp.readyState == 4 && xmlhttp.status == 200) {
                            myObj=JSON.parse(xmlhttp.responseText);
                            document.getElementById("author").innerHTML=myObj.data.author;
                            document.getElementById("title").innerHTML="《"+myObj.data.title+"》";
                            document.getElementById("digest").innerHTML="“"+myObj.data.digest+"......”";
                        }
                    };
                    xmlhttp.open("GET","https://interface.meiriyiwen.com/article/today?dev=1",true);
                    xmlhttp.send();
                </script>
            </div>
        </div>
    </div>
</div>

<script>
    var mySwiper = new Swiper ('.swiper-container', {
        direction: 'vertical',
        height:window.innerHeight,
        mousewheel:true,
        scrollbar: {
            el: '.swiper-scrollbar',
        },
    })
</script>
</body>
<script src="js/base.js" type="text/javascript"></script>
</html>
