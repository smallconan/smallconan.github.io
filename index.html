<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>只影何归</title>
    <link rel="stylesheet" href="css/trick.css">
    <link rel="stylesheet" href="css/dily.css">
    <link rel="stylesheet" href="css/search.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/swiper.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/APlayer.min.css">

    <script src="https://at.alicdn.com/t/font_1716017_6h8nblupuon.js"></script>
    <script src="js/jquery_2.1.4.js" type="text/javascript"></script>
    <script src="js/search.js" type="text/javascript"></script>
    <script src="js/swiper.js"></script>
    <script src="js/jquery.mousewheel.js"></script>

</head>
<body>

<!-- Swiper -->
<div class="swiper-container" id="sc1" style="overflow-y: scroll">
    <div class="swiper-wrapper">
        <!--搜索页-->
        <div class="swiper-slide" id="home-page">
            <!--侧边工具栏-->
            <div class="side-box-holder">
                <!--占位DIV-->
                <div class="place-45"></div>

                <!--搜索框-->
                <div id="search_bar" class="search_bar side-box search_open" title="搜索">
                        <span class="close" title="关闭搜索"></span>
                        <form action="https://www.baidu.com/baidu" target="_blank" method="get">
                            <input class="input"  type="text" name="wd" id="search" autocomplete="off">
                            <input class="search_btn" type="submit" name="wd" id="search-btn">
                        </form>
                        <span class="search_ico" title="搜索" id="search-ico"></span>
                    </div>
                <div class="side-box blog" title="我的博客"></div>
                <!--翻译功能-->
                <div class="side-box translate" title="翻译"></div>
            </div>
            <!--底部快捷导航栏-->
            <div class="web-box-holder">
                <div class="web-box">
                    <div class="box-container">
                        <div class="box" title="bilibili">
                            <div class="box-slogan"><img src="img/bilibili.png"></div>
                            <div class="box-title"> bilibili</div>
                        </div>
                    </div>
                    <div class="box-container">
                        <div class="box" title="Minecraft">
                            <div class="box-slogan"><img src="img/minecraft.png"> </div>
                            <div class="box-title">我的世界中文论坛</div>
                        </div>
                    </div>
                    <div class="box-container">
                        <div class="box" title="google">
                            <div class="box-slogan"><img src="img/google.png" width="32" height="32"> </div>
                            <div class="box-title">谷歌翻译</div>
                        </div>
                    </div>
                    <div class="box-container">
                        <div class="box" title="YouTube">
                            <div class="box-slogan"><img src="img/youtube.png"> </div>
                            <div class="box-title">YouTube</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!--文章页-->
        <div class="swiper-slide read-light read" id="read">
            <div id="#error" class="error"></div>
            <!--一言-->
            <div class="row flex-spaces child-borders yiyan" >
                    <span  class="border border-primary contents " id="yiyan"></span>
            </div>
            <!--音乐播放器-->
            <div class=" child-borders music" >
                <embed border="0"
                       marginwidth="0" marginheight="0"
                       width="250" height="88"
                       src="//music.163.com/outchain/player?type=3&id=2063206669&auto=0&height=66">
            </div>
            <!--每日一文-->
            <div class="mw-logo">
                每日一文
            </div>
            <div class="mw-holder child-borders child-shadows " id="mw">
                <!--内嵌Swiper-->
                    <div class="swiper-container" id="sc2">
                        <div class="swiper-wrapper">
                            <div class="swiper-slide scroll-warp mw" >
                                <div class="mw">
                                    <div class="mw-tools">
                                        <span class="deng" id="mw-deng">
                                             <svg class="icon" aria-hidden="true">
                                                <use xlink:href="#icon-deng" id="deng-type"></use>
                                            </svg>
                                        </span>
                                    </div>
                                    <h2 id="mw-title" class="mw-title"></h2>
                                    <h4 id="mw-author" class="mw-author"></h4>
                                    <div id="mw-content" class=" mw-content"></div>
                                </div>
                            </div>
                        </div>
                    </div>
            </div>
            <div class="more-info">
                ↓ 下滑查看更多资讯 ↓
            </div>
        </div>
    </div>
    <!-- Add Pagination -->
    <div class="swiper-pagination"></div>
</div>

<!--资讯页容器-->
    <div class="zx-container">
        <!--资讯页-->
        <div class="zx">
            <!--知乎日报-->
            <div class="zx-holder clearfix">
                <div class="zx-div child-borders child-shadows">
                    <img src="https://daily.zhihu.com/img/new_home_v3/top_logo.png" >
                </div>
                <div class="zx-box-holder clearfix">
                    <div class="zhihu-box-container clearfix" id="zhihu-daily" ></div>
                </div>
            </div>
            <!--微博热搜-->
            <div class="zx-holder clearfix">
                <div class="zx-div child-shadows child-borders">
                        <img src="img/weibo.png" style="background-color: white">
                </div>
                <div class="zx-box-holder">
                    <div class="zhihu-box-container clearfix">
                        <table class="wb table-hover">
                            <thead>
                            <tr>
                                <th>序号</th>
                                <th>关键词</th>
                                <th>热度</th>
                            </tr>
                            </thead>
                            <tbody id="re-sou">

                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
<!--footer-->
<div class="foot">
    <div class="footer">
        <div class="copyright">
            <span>©只影何归 2020</span><br>
            <span>本页面所有内容版权归原作者所有</span><br>
        </div>
       <div class="api">
           <span>每日一文<a href="https://meiriyiwen.com/" target="_blank">感谢每日一文API </a> </span>
           <span>| 热搜·知乎日报·一言 <a href="https://alapi.cn/" target="_blank">感谢ALAPI</a></span>
       </div>

    </div>
</div>
<!-- Initialize Swiper -->
<script src="js/initial.js"></script>
</body>
<script src="js/base.js" type="text/javascript"></script>
<script src="js/interface.js" type="text/javascript"></script>
<script src="js/mw.js"></script>
</html>
