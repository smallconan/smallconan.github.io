<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>只影何归</title>
    <link rel="stylesheet" href="css/trick.css">
    <link rel="stylesheet" href="css/dily.css">

    <link rel="stylesheet" href="css/search.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/swiper.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/APlayer.min.css">

    <script src="js/jquery_2.1.4.js" type="text/javascript"></script>
    <script src="js/search.js" type="text/javascript"></script>
    <script src="js/swiper.js"></script>


</head>
<body>
<!-- Swiper -->
<div class="swiper-container" id="sc1">
    <div class="swiper-wrapper">
        <div class="swiper-slide">
            <!--侧边工具栏-->
            <div class="side-box-holder">
                <!--占位DIV-->
                <div class="place-45"></div>
                <!--搜索框-->
                <div id="search_bar" class="search_bar side-box" title="搜索">
                        <span class="close" title="关闭搜索"></span>
                        <form action="https://www.baidu.com/baidu" target="_blank" method="get">
                            <input class="input"  type="text" name="wd" id="search" autocomplete="off">
                            <input class="search_btn" type="submit" name="wd" id="search-btn">
                        </form>
                        <span class="search_ico" title="搜索" id="search-ico"></span>
                    </div>
                <div class="side-box blog" title="我的博客"></div>
                <!--翻译功能-->
                <div class="side-box translate" title="翻译"></div>
            </div>
            <!--底部快捷导航栏-->
            <div class="web-box-holder">
                <div class="web-box">
                    <div class="box-container">
                        <div class="box" title="bilibili">
                            <div class="box-slogan"><img src="img/bilibili.png"></div>
                            <div class="box-title"> bilibili</div>
                        </div>
                    </div>
                    <div class="box-container">
                        <div class="box" title="Minecraft">
                            <div class="box-slogan"><img src="img/minecraft.png"> </div>
                            <div class="box-title">我的世界中文论坛</div>
                        </div>
                    </div>
                    <div class="box-container">
                        <div class="box" title="google">
                            <div class="box-slogan"><img src="img/google.png" width="32" height="32"> </div>
                            <div class="box-title">谷歌翻译</div>
                        </div>
                    </div>
                    <div class="box-container">
                        <div class="box" title="YouTube">
                            <div class="box-slogan"><img src="img/youtube.png"> </div>
                            <div class="box-title">YouTube</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="swiper-slide read">
            <div id="#error" class="error"></div>
            <div class="row flex-spaces child-borders yiyan" >
                    <span  class="border border-primary contents " id="yiyan"></span>
            </div>
            <div class=" child-borders music" >
                <embed border="0"
                       marginwidth="0" marginheight="0"
                       width="250" height="88"
                       src="//music.163.com/outchain/player?type=3&id=2063206669&auto=0&height=66">
            </div>
            <div class="mw-holder child-borders child-shadows">
                    <div class="swiper-container" id="sc2">
                        <div class="swiper-wrapper">
                            <div class="swiper-slide" >
                                <div class="mw">
                                    <h4 id="mw-title" class="mw-title"></h4>
                                    <h5 id="mw-author" class="mw-author"></h5>
                                    <div id="mw-content" class=" mw-content"></div>
                                </div>
                            </div>
                        </div>
                        <div class="swiper-scrollbar" id="sw-bar"></div>
                    </div>
            </div>
        </div>
    </div>
    <!-- Add Pagination -->
</div>

<!-- Initialize Swiper -->
<script>
        var mySwiper1 = new Swiper('#sc1', {
            direction: 'vertical',
            nested: true,
            mousewheel:true,
        });

        var swiper = new Swiper('#sc2', {
            direction: 'vertical',
            nested: true,
            mousewheel: true,
            scrollbar: {
                el: '#sw-bar',
            },
        });
</script>
</body>
<script src="js/base.js" type="text/javascript"></script>
<script src="js/interface.js" type="text/javascript"></script>
</html>
