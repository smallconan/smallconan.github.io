<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>今日美文</title>
    <link rel="stylesheet" href="css/swiper.css">
    <link rel="stylesheet" href="css/paper.css">
    <link rel="stylesheet" href="css/dily.css">
</head>
<body>
<article class="article">
    <div style="padding: 50px 80px;overflow-y: auto !important;display: inline-block">
        <div style="text-align: center;">
            <p class="article-title"><span id="title" ></span></p>
            <p class="article-meta">Written By:<span id="author" style="font-size: 1.3em;font-style:italic"></span></p>
            <span id="current_time" style="font-size: 0.8em;font-style:italic"></span> <br>
        </div>
        <span id="text" style="font-size: 1.5em;text-indent:2em;color: black"></span>
        <script>
            var xmlhttp=new XMLHttpRequest();
            var myObj;
            xmlhttp.onreadystatechange=function(){
                if (xmlhttp.readyState == 4 && xmlhttp.status == 200) {
                    myObj=JSON.parse(xmlhttp.responseText);
                    document.getElementById("text").innerHTML=myObj.data.content;
                    document.getElementById("title").innerHTML=myObj.data.title;
                    document.getElementById("author").innerHTML=myObj.data.author;
                    document.getElementById("current_time").innerHTML=myObj.data.date.curr
                    console.log( );
                }
            };
            xmlhttp.open("GET","https://interface.meiriyiwen.com/article/today?dev=1",true);
            xmlhttp.send();
        </script>
    </div>
</article>

</body>
</html>
